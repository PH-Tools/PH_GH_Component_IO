name: CI

# This repo is distributed via GitHub download (not PyPI),
# so we only run tests and auto-tag — no publish step.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install '.[dev]'
      - run: python -m pytest tests/ || echo "No tests found — skipping"

  bump-and-tag:
    name: Bump version and tag
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install bump-my-version
        run: pip install bump-my-version

      # Determine bump level from PR labels if this was a merged PR
      - name: Determine version bump
        id: bump_level
        uses: actions/github-script@v7
        with:
          script: |
            const commits = context.payload.commits || [];
            const mergeCommit = commits.find(c => c.message.startsWith('Merge pull request'));
            if (mergeCommit) {
              const match = mergeCommit.message.match(/#(\d+)/);
              if (match) {
                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: parseInt(match[1])
                });
                const labels = pr.data.labels.map(l => l.name);
                if (labels.includes('bump:major')) {
                  core.setOutput('level', 'major');
                  return;
                }
                if (labels.includes('bump:minor')) {
                  core.setOutput('level', 'minor');
                  return;
                }
              }
            }
            core.setOutput('level', 'patch');

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bump-my-version bump ${{ steps.bump_level.outputs.level }}

      - name: Push version commit and tag
        run: git push --follow-tags
